apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: toggle-master-ingress
  namespace: auth-service
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /flags(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: flag-service-ext
                port:
                  number: 80
          - path: /targeting(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: targeting-service-ext
                port:
                  number: 80
          - path: /evaluate(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: evaluation-service-ext
                port:
                  number: 80
          - path: /analytics(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: analytics-service-ext
                port:
                  number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service-ext
  namespace: auth-service
spec:
  type: ExternalName
  externalName: flag-service.flag-service.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service-ext
  namespace: auth-service
spec:
  type: ExternalName
  externalName: targeting-service.targeting-service.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service-ext
  namespace: auth-service
spec:
  type: ExternalName
  externalName: evaluation-service.evaluation-service.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service-ext
  namespace: auth-service
spec:
  type: ExternalName
  externalName: analytics-service.analytics-service.svc.cluster.local
