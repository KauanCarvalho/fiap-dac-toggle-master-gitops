apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: analytics-service-secret
  namespace: analytics-service
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: analytics-service-secret
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: togglemaster/analytics/access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: togglemaster/analytics/secret_key
    - secretKey: AWS_SESSION_TOKEN
      remoteRef:
        key: togglemaster/analytics/session_token
    - secretKey: AWS_SQS_URL
      remoteRef:
        key: togglemaster/common/sqs_url
