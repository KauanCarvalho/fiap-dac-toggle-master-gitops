apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: evaluation-service-secret
  namespace: evaluation-service
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: evaluation-service-secret
    creationPolicy: Owner
  data:
    - secretKey: SERVICE_API_KEY
      remoteRef:
        key: togglemaster/evaluation/api_key
    - secretKey: REDIS_URL
      remoteRef:
        key: togglemaster/evaluation/redis_url
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: togglemaster/evaluation/access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: togglemaster/evaluation/secret_key
    - secretKey: AWS_SESSION_TOKEN
      remoteRef:
        key: togglemaster/evaluation/session_token
    - secretKey: AWS_SQS_URL
      remoteRef:
        key: togglemaster/common/sqs_url
