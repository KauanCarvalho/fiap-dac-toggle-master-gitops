name: Terraform Production

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/production/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.6.0"
  WORKING_DIR: terraform/production
  AWS_REGION: us-east-1
  TF_VAR_db_password_auth: ${{ secrets.DB_PASSWORD_AUTH }}
  TF_VAR_db_password_flag: ${{ secrets.DB_PASSWORD_FLAG }}
  TF_VAR_db_password_targeting: ${{ secrets.DB_PASSWORD_TARGETING }}

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        id: init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="togglemaster-terraform-state-${ACCOUNT_ID}"
          terraform init -input=false \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=togglemaster-terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

      - name: Post Plan Summary
        if: always()
        run: |
          echo "## Terraform Production — Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step     | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format   | ${{ steps.fmt.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Init     | ${{ steps.init.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ steps.validate.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plan     | ${{ steps.plan.outcome }} |" >> $GITHUB_STEP_SUMMARY

  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    environment:
      name: production
      url: https://console.aws.amazon.com/ecr/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="togglemaster-terraform-state-${ACCOUNT_ID}"
          terraform init -input=false \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=togglemaster-terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -no-color -auto-approve tfplan

      - name: Show Outputs
        run: terraform output -no-color

      - name: Post Apply Summary
        if: success()
        run: |
          echo "## Production Applied Successfully" >> $GITHUB_STEP_SUMMARY

  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    environment:
      name: production-destroy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="togglemaster-terraform-state-${ACCOUNT_ID}"
          terraform init -input=false \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=togglemaster-terraform-state-lock" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -no-color -auto-approve
