apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flag-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/KauanCarvalho/fiap-dac-toggle-master-gitops.git
    targetRevision: HEAD
    path: k8s/apps/flag-service
  destination:
    server: https://kubernetes.default.svc
    namespace: flag-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
